name: drinklion
description: >
  DrinkLion - A smart health reminder app for Indonesians. Stay hydrated with 
  intelligent water and meal reminders. Features customizable schedules, fasting 
  mode support, quiet hours, and reminder history tracking. All data stored locally 
  - no cloud, no tracking, 100% privacy.

publish_to: 'none'

version: 1.0.0+1

homepage: https://github.com/presley03/drinklion
repository: https://github.com/presley03/drinklion
issue_tracker: https://github.com/presley03/drinklion/issues
documentation: https://github.com/presley03/drinklion

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: '>=3.13.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  provider: ^6.0.0
  equatable: ^2.0.8

  # Local Database
  sqflite: ^2.2.8+4
  sqflite_common_ffi: ^2.2.4
  path: ^1.8.3

  # Notifications
  flutter_local_notifications: ^17.1.0
  workmanager: ^0.9.0
  timezone: ^0.9.2

  # UI & Theme
  flutter_svg: ^2.0.5
  intl: ^0.19.0

  # Utilities
  get_it: ^7.5.0
  logger: ^2.1.0
  json_annotation: ^4.11.0

  # Testing
  mockito: ^5.4.0
  bloc_test: ^9.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^2.0.0

  # Code generation
  build_runner: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/

test:
  coverage:
    - lib
